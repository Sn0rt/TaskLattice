{{- $component := "runner" -}}
{{- $name := include "tasklattice.componentName" (dict "root" . "component" $component) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "tasklattice.labels" . | nindent 4 }}
    {{- include "tasklattice.selectorLabels" (dict "root" . "component" $component) | nindent 4 }}
spec:
  replicas: {{ .Values.runner.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "tasklattice.selectorLabels" (dict "root" . "component" $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tasklattice.selectorLabels" (dict "root" . "component" $component) | nindent 8 }}
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.global.rolloutRevision }}
        tasklattice.ai/rollout-revision: {{ . | quote }}
        {{- end }}
    spec:
      terminationGracePeriodSeconds: 600
      automountServiceAccountToken: false
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: runner
          image: {{ include "tasklattice.image" (dict "root" . "image" .Values.images.runner) }}
          imagePullPolicy: {{ .Values.images.runner.pullPolicy }}
          ports:
            - name: http
              containerPort: 9090
          env:
            - name: NEMOCLAW_RUNNER_MODE
              value: openshell-kubernetes
            - name: NEMOCLAW_RUNNER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "tasklattice.secretName" . }}
                  key: runner-token
            - name: OPENSHELL_GATEWAY_ENDPOINT
              value: {{ default (printf "http://%s.%s.svc.cluster.local:8080" (include "tasklattice.componentName" (dict "root" . "component" "openshell")) .Release.Namespace) .Values.runner.gatewayEndpoint | quote }}
            - name: OPENSHELL_SERVICE_BASE_URL
              value: {{ .Values.runner.serviceBaseUrl | quote }}
            - name: OPENSHELL_SANDBOX_IMAGE
              value: {{ include "tasklattice.image" (dict "root" . "image" .Values.images.openclawSandbox) | quote }}
            - name: OPENSHELL_HERMES_SANDBOX_IMAGE
              value: {{ include "tasklattice.image" (dict "root" . "image" .Values.images.hermesSandbox) | quote }}
            - name: OPENSHELL_KUBERNETES_SERVICE_CIDRS
              value: {{ .Values.runner.kubernetesServiceCidrs | quote }}
            - name: OPENSHELL_SANDBOX_CPU
              value: {{ .Values.runner.sandbox.cpu | quote }}
            - name: OPENSHELL_SANDBOX_MEMORY
              value: {{ .Values.runner.sandbox.memory | quote }}
            - name: NEMOCLAW_RUNNER_SHUTDOWN_TIMEOUT_MS
              value: "540000"
            {{- with .Values.runner.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.runner.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: home
              mountPath: /home/node
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
        - name: home
          emptyDir:
            sizeLimit: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "tasklattice.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "tasklattice.selectorLabels" (dict "root" . "component" $component) | nindent 4 }}
  ports:
    - name: http
      port: 9090
      targetPort: http
