apiVersion: apps/v1
kind: Deployment
metadata:
  name: tasklattice-control
  namespace: tasklattice-sandboxes
  labels:
    app.kubernetes.io/name: tasklattice-control
    app.kubernetes.io/part-of: tasklattice
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tasklattice-control
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tasklattice-control
        app.kubernetes.io/part-of: tasklattice
    spec:
      serviceAccountName: tasklattice-control
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: control
          image: tasklattice-control:0.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DATABASE_PATH
              value: /data/tasklattice.db
            - name: NEMOCLAW_RUNNER_URL
              value: http://nemoclaw-runtime-runner.runtime.svc.cluster.local:9090
            - name: NEMOCLAW_RUNNER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tasklattice-runtime-runner
                  key: token
            - name: LITELLM_BASE_URL
              value: http://tasklattice-litellm.tasklattice-sandboxes.svc.cluster.local:4000
            - name: LITELLM_COMPLIANCE_DOMAIN
              value: GLOBAL
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: tasklattice-litellm
                  key: master-key
            - name: TALI_BUILTIN_POLICIES_PATH
              value: /etc/tasklattice/policies/catalog.yaml
            - name: TALI_EXTENSION_CATALOG_SEED
              value: development
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: /data
            - name: policies
              mountPath: /etc/tasklattice/policies
              readOnly: true
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 32Mi
        - name: data
          persistentVolumeClaim:
            claimName: tasklattice-control-data
        - name: policies
          configMap:
            name: tasklattice-sandbox-policies
