apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
components:
  - ../../components/local-auth
  - ../../components/litellm-admin-loadbalancer
resources:
  - ../../base
  - ../../litellm
secretGenerator:
  - name: tasklattice-runtime-runner
    namespace: tasklattice-sandboxes
    literals:
      - token=local-dev-token
  - name: tasklattice-litellm
    namespace: tasklattice-sandboxes
    literals:
      - master-key=sk-tasklattice-local
      - postgres-password=tasklattice-local
      - database-url=postgresql://litellm:tasklattice-local@tasklattice-litellm-postgres:5432/litellm
      - ui-username=admin
      - ui-password=tasklattice-local-admin
      - salt-key=tasklattice-local-litellm-salt-v1
patches:
  - target:
      kind: Deployment
      name: tasklattice-control
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/2/value
        value: http://host.docker.internal:9090
