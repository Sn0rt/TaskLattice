apiVersion: v1
kind: Service
metadata:
  name: tasklattice-litellm-postgres
  namespace: tasklattice-sandboxes
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: tasklattice-litellm-postgres
  ports:
    - name: postgres
      port: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tasklattice-litellm-postgres
  namespace: tasklattice-sandboxes
spec:
  serviceName: tasklattice-litellm-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tasklattice-litellm-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tasklattice-litellm-postgres
    spec:
      automountServiceAccountToken: false
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: litellm
            - name: POSTGRES_USER
              value: litellm
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tasklattice-litellm
                  key: postgres-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
