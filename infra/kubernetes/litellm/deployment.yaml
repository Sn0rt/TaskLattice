apiVersion: apps/v1
kind: Deployment
metadata:
  name: tasklattice-litellm
  namespace: tasklattice-sandboxes
  labels:
    app.kubernetes.io/name: tasklattice-litellm
    app.kubernetes.io/part-of: tasklattice
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tasklattice-litellm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tasklattice-litellm
        app.kubernetes.io/part-of: tasklattice
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm-database:main-stable
          imagePullPolicy: IfNotPresent
          args: ["--port", "4000", "--num_workers", "2"]
          ports:
            - name: http
              containerPort: 4000
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: tasklattice-litellm
                  key: master-key
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tasklattice-litellm
                  key: database-url
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
