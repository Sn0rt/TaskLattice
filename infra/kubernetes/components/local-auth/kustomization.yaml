apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
secretGenerator:
  - name: tasklattice-control-auth
    namespace: tasklattice-sandboxes
    literals:
      - jwt-secret=tasklattice-local-development-secret
      - password-hash=$2b$12$8hg5TQ1lwPDsXKRXFCD9HeJIkYvSG/TLaVmYihgY87tV2WZCNfXky
patches:
  - target:
      kind: Deployment
      name: tasklattice-control
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: TALI_AUTH_MODE
          value: local
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: TALI_AUTH_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: tasklattice-control-auth
              key: jwt-secret
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: TALI_AUTH_LOCAL_PASSWORD_HASH
          valueFrom:
            secretKeyRef:
              name: tasklattice-control-auth
              key: password-hash
