{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tasklattice.secretName" . }}
  labels:
    {{- include "tasklattice.labels" . | nindent 4 }}
type: Opaque
stringData:
  runner-token: {{ required "secrets.runnerToken is required" .Values.secrets.runnerToken | quote }}
  litellm-master-key: {{ required "secrets.litellmMasterKey is required" .Values.secrets.litellmMasterKey | quote }}
  postgres-password: {{ required "secrets.postgresPassword is required" .Values.secrets.postgresPassword | quote }}
  database-url: {{ include "tasklattice.databaseUrl" . | quote }}
  jwt-secret: {{ required "secrets.jwtSecret is required" .Values.secrets.jwtSecret | quote }}
  local-password: {{ required "secrets.localPassword is required" .Values.secrets.localPassword | quote }}
  oidc-client-secret: {{ .Values.auth.oidc.clientSecret | quote }}
  litellm-ui-username: {{ .Values.secrets.litellmUiUsername | quote }}
  litellm-ui-password: {{ .Values.secrets.litellmUiPassword | quote }}
  litellm-salt-key: {{ .Values.secrets.litellmSaltKey | quote }}
{{- end }}

