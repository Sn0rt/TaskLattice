apiVersion: apps/v1
kind: Deployment
metadata:
  name: tasklattice-openshell-runner
  namespace: tasklattice-sandboxes
  labels:
    app.kubernetes.io/name: tasklattice-openshell-runner
    app.kubernetes.io/part-of: tasklattice
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tasklattice-openshell-runner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tasklattice-openshell-runner
        app.kubernetes.io/part-of: tasklattice
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: runner
          image: tasklattice-openshell-runner:0.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9090
          env:
            - name: NEMOCLAW_RUNNER_MODE
              value: openshell-kubernetes
            - name: NEMOCLAW_RUNNER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tasklattice-runtime-runner
                  key: token
            - name: OPENSHELL_GATEWAY_ENDPOINT
              value: http://openshell.openshell.svc.cluster.local:8080
            - name: OPENSHELL_SERVICE_BASE_URL
              value: http://openshell.localhost:8080
            - name: OPENSHELL_SANDBOX_IMAGE
              value: tasklattice-nemoclaw-sandbox:0.3.0
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 384Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: home
              mountPath: /home/node
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
        - name: home
          emptyDir:
            sizeLimit: 32Mi
