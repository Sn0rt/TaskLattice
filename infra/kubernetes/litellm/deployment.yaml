apiVersion: apps/v1
kind: Deployment
metadata:
  name: tasklattice-litellm
  namespace: tasklattice-sandboxes
  labels:
    app.kubernetes.io/name: tasklattice-litellm
    app.kubernetes.io/part-of: tasklattice
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: tasklattice-litellm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tasklattice-litellm
        app.kubernetes.io/part-of: tasklattice
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: litellm
          image: tasklattice-litellm:0.2.0
          imagePullPolicy: IfNotPresent
          args: ["--port", "4000", "--num_workers", "2", "--use_v2_migration_resolver"]
          ports:
            - name: http
              containerPort: 4000
          env:
            - name: LITELLM_MIGRATION_DIR
              value: /tmp/litellm-migrations
            - name: STORE_MODEL_IN_DB
              value: "True"
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: tasklattice-litellm
                  key: master-key
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tasklattice-litellm
                  key: database-url
          startupProbe:
            httpGet:
              path: /health/liveliness
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
