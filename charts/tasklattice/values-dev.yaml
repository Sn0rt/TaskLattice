# Local development uses the same canonical image names as a release. Images
# are built into the local Docker store with the mutable :dev tag and are never
# published by the release workflow.
global:
  imageRegistry: ghcr.io/sn0rt

images:
  control:
    tag: dev
    pullPolicy: IfNotPresent
  runner:
    tag: dev
    pullPolicy: IfNotPresent
  litellm:
    tag: dev
    pullPolicy: IfNotPresent
  openclawSandbox:
    tag: dev
  hermesSandbox:
    tag: dev

# Match the existing trusted local-cluster developer experience.
control:
  service:
    type: LoadBalancer

litellm:
  service:
    type: LoadBalancer

openshell:
  service:
    type: LoadBalancer
